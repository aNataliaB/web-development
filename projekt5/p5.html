<!DOCTYPE html>
<html lang="pl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Faktura VAT</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f0f0f0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .faktura {
      position: relative;
      width: 766px;
      height: 690px;
      background-image: url("vat.png");
      background-size: cover;
      border: 1px solid #ccc;
      margin-top: 20px;
    }

    .pole {
      position: absolute;
      font-size: 14px;
      color: #000;
    }

    #numer {
      top: 72px;
      left: 310px;
      font-weight: bold;
    }

    #miejscowosc {
      top: 25px;
      left: 520px;
    }

    #sprzedawca-nazwa {
      top: 25px;
      left: 80px;
      font-weight: bold;
    }

    #sprzedawca-adres {
      top: 65px;
      left: 70px;
    }

    #sprzedawca-nip {
      top: 85px;
      left: 90px;
    }

    #nabywca-nazwa {
      top: 125px;
      left: 210px;
      font-weight: bold;
    }

    #uslugi-lista {
      position: absolute;
      top: 255px;
      left: 70px;
      width: 500px;
      font-size: 14px;
      line-height: 20px;
    }

    #kwota {
      position: absolute;
      top: 590px;
      left: 488px;
      font-weight: bold;
    }
  </style>
</head>

<body>
  <h2>Faktura VAT</h2>

  <div class="faktura">
    <div id="numer" class="pole"></div>
    <div id="miejscowosc" class="pole"></div>
    <div id="sprzedawca-nazwa" class="pole"></div>
    <div id="sprzedawca-adres" class="pole"></div>
    <div id="sprzedawca-nip" class="pole"></div>

    <div id="nabywca-nazwa" class="pole"></div>
    <div id="uslugi-lista" class="pole"></div>
    <div id="kwota" class="pole"></div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const xmlFilePath = 'faktura.xml';

      fetch(xmlFilePath)
        .then(response => {
          if (!response.ok) {
            throw new Error(`Błąd wczytywania XML: ${response.statusText}`);
          }
          return response.text();
        })
        .then(xmlText => {
          const parser = new DOMParser();
          const xml = parser.parseFromString(xmlText, "text/xml");

          if (xml.querySelector('parsererror')) {
            console.error("Błąd parsowania XML:", xml.querySelector('parsererror').textContent);
            document.body.innerHTML = '<h2>Błąd wczytywania faktury</h2><p>Wystąpił błąd podczas parsowania pliku XML.</p>';
            return;
          }

          const numer = xml.querySelector("NumerFaktury")?.textContent || "";
          const miejscowosc = xml.querySelector("Miejscowosc")?.textContent || "";

          const sprzedawcaNazwa = xml.querySelector("Sprzedawca > Nazwa")?.textContent || "";
          const sprzedawcaAdres = xml.querySelector("Sprzedawca > Adres")?.textContent || "";
          const sprzedawcaNip = xml.querySelector("Sprzedawca > NIP")?.textContent || "";

          const nabywca = xml.querySelector("Kupujacy")?.textContent || "";

          let sumaKwotaNetto = 0.0;

          const listaUslug = Array.from(xml.querySelectorAll("Usluga")).map(u => {
            const nazwa = u.querySelector("Nazwa")?.textContent;
            const ilosc = u.querySelector("Ilosc")?.textContent;
            const cena = u.querySelector("CenaNettoJednostkowa")?.textContent;
            const sumaText = u.querySelector("SumaNetto")?.textContent;

            const suma = parseFloat(sumaText) || 0;
            sumaKwotaNetto += suma;

            return `<span style="display:inline-block; width:211px;">${nazwa}</span>
                      <span style="display:inline-block; width:80px; text-align:right;">${ilosc}</span>
                      <span style="display:inline-block; width:80px; text-align:right;">${cena}</span>
                      <span style="display:inline-block; width:78px; text-align:right;">${sumaText}</span>`;
          }).join("<br>");

          const kwotaDoWyswietlenia = sumaKwotaNetto.toFixed(2);

          document.getElementById("numer").innerHTML = numer;
          document.getElementById("miejscowosc").innerHTML = miejscowosc;

          document.getElementById("sprzedawca-nazwa").innerHTML = sprzedawcaNazwa;
          document.getElementById("sprzedawca-adres").innerHTML = sprzedawcaAdres;
          document.getElementById("sprzedawca-nip").innerHTML = sprzedawcaNip;

          document.getElementById("nabywca-nazwa").innerHTML = nabywca;

          document.getElementById("uslugi-lista").innerHTML = listaUslug;

          document.getElementById("kwota").innerHTML = kwotaDoWyswietlenia;
        })
        .catch(error => {
          console.error("Ogólny błąd ładowania danych:", error);
          document.body.innerHTML = '<h2>Błąd ładowania faktury</h2><p>Nie udało się wczytać pliku faktura.xml.</p>';
        });
    });
  </script>

</body>

</html>
