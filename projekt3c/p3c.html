<!DOCTYPE html>
<html>

<head>
	<meta charset="UTF-8">
	<link rel="stylesheet" href="p3cstyle.css">
	<title>Strona z formularzem</title>

</head>

<body>

	<h1>Formularz</h1>

	<form action="/action_page.php">
		<label for="imie">Imie:</label><br>
		<input type="text" id="imie" name="imie" required><br><br>

		<label for="nazwisko">Nazwisko:</label><br>
		<input type="text" id="nazwisko" name="nazwisko" required><br><br>

		<label for="dataurodzenia">Data urodzenia:</label><br>
		<input type="date" id="dataurodzenia" name="dataurodzenia" required><br><br>

		<label for="plec">Płeć:</label><br><br>
		<input type="radio" id="k" name="plec" value="Kobieta">
		<label for="k">Kobieta</label>
		<input type="radio" id="m" name="plec" value="Mężczyzna">
		<label for="m">Mężczyzna</label>
		<input type="radio" id="w" name="plec" value="Wolę nie odpowidać">
		<label for="w">Wolę nie odpowidać</label><br><br>

		<label for="telefon">Numer telefonu:</label><br>
		<input type="tel" id="telefon" name="telefon" placeholder="123-456-789" pattern="[0-9]{3}-[0-9]{3}-[0-9]{3}"
			required><br><br>

		<label for="email">Email:</label><br>
		<input type="email" id="email" name="email" required><br><br>

		<label for="ulica">Ulica:</label><br>
		<input type="text" id="ulica" name="ulica" required><br><br>

		<label for="miasto">Miasto:</label><br>
		<input type="text" id="miasto" name="miasto required"><br><br>

		<label for="wojewodztwo">Województwo:</label><br><br>
		<select id="wojewodztwo" name="wojewodztwo">
			<option value="dolonslaskie">dolnośląskie</option>
			<option value="kujawsko-pomorskie">kojawsko-pomorskie</option>
			<option value="lubelskie">lubelskie</option>
			<option value="lodzkie">łódzkie</option>
			<option value="malopolskie">małopolskie</option>
			<option value="mazowieckie">mazowieckie</option>
			<option value="opolskie">opolskie</option>
			<option value="podkarpackie">podkarpackie</option>
			<option value="podlaskie">podlaskie</option>
			<option value="pomorskie">pomorskie</option>
			<option value="slaskie">śląskie</option>
			<option value="swietokrzyskie">świętokrzyskie</option>
			<option value="warminsko-mazurskie">warmińsko-mazurskie</option>
			<option value="wielkopolskie">wielkopolskie</option>
			<option value="zachodniopomorskie">zachodniopomorskie</option>
		</select><br><br>

		<label for="prawojazdy">Czy posiadasz prawo jazdy?:</label><br>
		<input type="radio" id="nie" name="prawojazdy" value="Nie">
		<label for="nie">Nie</label><br>
		<input type="radio" id="tak" name="prawojazdy" value="Tak">
		<label for="tak">Tak, kategorii:</label>
		<input type="checkbox" id="kategoriaA1" name="kategoriaA1" value="A1">
		<label for="kategoriaA1"> A1</label>
		<input type="checkbox" id="kategoriaA2" name="kategoriaA2" value="A2">
		<label for="kategoriaA2"> A2</label>
		<input type="checkbox" id="kategoriaB1" name="kategoriaB1" value="B1">
		<label for="kategoriaB1"> B1</label>
		<input type="checkbox" id="kategoriaB" name="kategoriaB" value="B">
		<label for="kategoriaB"> B</label>
		<input type="checkbox" id="kategoriaB+E" name="kategoriaB+E" value="B+E">
		<label for="kategoriaB+E"> B+E</label>
		<input type="checkbox" id="kategoriaC1" name="kategoriaC1" value="C1">
		<label for="kategoriaC1"> C1</label>
		<input type="checkbox" id="kategoriaC+E" name="kategoriaC+E" value="C+E">
		<label for="kategoriaC+E"> C+E</label>
		<input type="checkbox" id="kategoriaD1" name="kategoriaD1" value="D1">
		<label for="kategoriaD1"> D1</label>
		<input type="checkbox" id="kategoriaD" name="kategoriaD" value="D">
		<label for="kategoriaD"> D</label>
		<input type="checkbox" id="kategoriaD+E" name="kategoriaD+E" value="D+E">
		<label for="kategoriaD+E"> D+E</label>
		<input type="checkbox" id="kategoriaT" name="kategoriaT" value="T">
		<label for="kategoriaT"> T</label><br><br>

		<label for="uwagi">Uwagi:</label><br>
		<small>Maksymalna liczba znaków:100!</small><br>
		<textarea name="message" rows="10" cols="30" maxlength="100"></textarea><br><br>

		<label for="haslo">Hasło:</label><br>
		<input type="password" id="haslo" name="haslo" required><br><br>

		<input type="submit" value="Wyślij">
		<input type="reset" value="Wyczyść">
	</form>


</body>

</html>
